name: Daily Greeting

on:
  schedule:
    - cron: "1 0 * * *" # 00:00 UTC = 08:00 Beijing time (UTC+8)
  workflow_dispatch: # Allow manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Send daily greeting
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_USER_ID: ${{ secrets.WECHAT_USER_ID }}
          WECHAT_TEMPLATE_ID: ${{ secrets.WECHAT_TEMPLATE_ID }}
          PLUS_SENTENCE: ${{ secrets.PLUS_SENTENCE }}
        run: uv run python -m ybot.send_now
